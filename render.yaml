services:
  - type: web
    name: video-editor-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false

  - type: web
    name: video-editor-ai
    env: docker
    rootDir: ai-service
    plan: free
    envVars:
      - key: PORT
        value: 8000