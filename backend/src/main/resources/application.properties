server.port=8080

# MySQL Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/video_editor_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# IMPORTANT: Update with your MySQL root password if you set one
spring.datasource.password=aftabdb

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# External Python AI Service URL
ai.service.url=http://localhost:8000

# URL that the AI service can call to report processing progress
app.callback.base-url=http://localhost:8080
