# Render assigns a dynamic port using the PORT environment variable
server.port=${PORT:8080}

# Database Configuration using Environment Variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/video_editor_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:aftabdb}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# External Python AI Service URL
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# URL that the AI service can call to report processing progress
app.callback.base-url=${APP_CALLBACK_URL:http://localhost:8080}
